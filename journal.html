<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Journal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; }
        .container { width: 80%; margin: auto; }
        h1 { text-align: center; }
        form, table { margin-top: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; }
        .trade-table th, .trade-table td { padding: 10px; text-align: center; }
        .trade-table { width: 100%; border-collapse: collapse; }
        .trade-table th { background: #f4f4f4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Trade Journal</h1>
        <form id="tradeForm">
            <div class="form-group">
                <label for="tradeDate">Date/Time:</label>
                <input type="datetime-local" id="tradeDate" name="tradeDate" value="2026-04-22T14:16:23" required>
            </div>
            <div class="form-group">
                <label for="pair">Pair:</label>
                <select id="pair" name="pair" required>
                    <option value="EUR/USD">EUR/USD</option>
                    <option value="GBP/USD">GBP/USD</option>
                    <option value="USD/JPY">USD/JPY</option>
                    <option value="AUD/USD">AUD/USD</option>
                </select>
            </div>
            <div class="form-group">
                <label>Buy/Sell:</label>
                <input type="radio" id="buy" name="action" value="buy" required>
                <label for="buy">Buy</label>
                <input type="radio" id="sell" name="action" value="sell">
                <label for="sell">Sell</label>
            </div>
            <div class="form-group">
                <label for="entryPrice">Entry Price:</label>
                <input type="number" id="entryPrice" name="entryPrice" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="stopLoss">Stop Loss:</label>
                <input type="number" id="stopLoss" name="stopLoss" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="takeProfit">Take Profit:</label>
                <input type="number" id="takeProfit" name="takeProfit" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="lotSize">Lot Size:</label>
                <input type="number" id="lotSize" name="lotSize" step="0.01" required>
            </div>
            <div class="form-group">
                <label for="result">Result:</label>
                <select id="result" name="result" required>
                    <option value="win">Win</option>
                    <option value="loss">Loss</option>
                    <option value="break-even">Break Even</option>
                </select>
            </div>
            <div class="form-group">
                <label for="profitLoss">Profit/Loss:</label>
                <input type="number" id="profitLoss" name="profitLoss" step="0.01" readonly>
            </div>
            <div class="form-group">
                <label for="riskRewardRatio">Risk/Reward Ratio:</label>
                <input type="number" id="riskRewardRatio" name="riskRewardRatio" step="0.01" readonly>
            </div>
            <div class="form-group">
                <label for="screenshot">Screenshot:</label>
                <input type="file" id="screenshot" name="screenshot" accept="image/*">
            </div>
            <div class="form-group">
                <label for="psychologyNotes">Psychology Notes:</label>
                <textarea id="psychologyNotes" name="psychologyNotes"></textarea>
            </div>
            <button type="submit">Add Trade</button>
        </form>
        <table class="trade-table">
            <thead>
                <tr>
                    <th>Date/Time</th>
                    <th>Pair</th>
                    <th>Action</th>
                    <th>Entry Price</th>
                    <th>Stop Loss</th>
                    <th>Take Profit</th>
                    <th>Lot Size</th>
                    <th>Result</th>
                    <th>Profit/Loss</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tradeTableBody">
                <!-- Dynamic rows will be added here -->
            </tbody>
        </table>
    </div>
    <script>
        // JavaScript for calculations and dynamic content insertion will go here.
        // Function to calculate profit/loss and risk/reward ratio can be added.
        document.getElementById('tradeForm').onsubmit = function(event) {
            event.preventDefault();

            // Calculate profit/loss and risk/reward ratio
            const entryPrice = parseFloat(document.getElementById('entryPrice').value);
            const stopLoss = parseFloat(document.getElementById('stopLoss').value);
            const takeProfit = parseFloat(document.getElementById('takeProfit').value);
            const lotSize = parseFloat(document.getElementById('lotSize').value);
            const result = document.getElementById('result').value;

            let profitLoss = 0;
            let riskRewardRatio = 0;

            if (result === 'win') {
                profitLoss = (takeProfit - entryPrice) * lotSize;
                riskRewardRatio = (takeProfit - entryPrice) / (entryPrice - stopLoss);
            } else if (result === 'loss') {
                profitLoss = (stopLoss - entryPrice) * lotSize;
                riskRewardRatio = (entryPrice - stopLoss) / (takeProfit - entryPrice);
            }

            // Update profit/loss and risk/reward ratio fields
            document.getElementById('profitLoss').value = profitLoss.toFixed(2);
            document.getElementById('riskRewardRatio').value = riskRewardRatio.toFixed(2);

            // Add the new trade to the table
            const tableBody = document.getElementById('tradeTableBody');
            const row = tableBody.insertRow();
            row.innerHTML = `<td>${document.getElementById('tradeDate').value}</td>\n` +
                `<td>${document.getElementById('pair').value}</td>\n` +
                `<td>${document.querySelector('input[name="action"]:checked').value}</td>\n` +
                `<td>${entryPrice.toFixed(2)}</td>\n` +
                `<td>${stopLoss.toFixed(2)}</td>\n` +
                `<td>${takeProfit.toFixed(2)}</td>\n` +
                `<td>${lotSize.toFixed(2)}</td>\n` +
                `<td>${result}</td>\n` +
                `<td>${profitLoss.toFixed(2)}</td>\n` +
                `<td><button class='edit'>Edit</button> <button class='delete'>Delete</button></td>`;

            // Reset form
            document.getElementById('tradeForm').reset();
        };
    </script>
</body>
</html>
