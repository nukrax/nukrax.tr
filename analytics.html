<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics Page</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        canvas { width: 100%; height: 400px; }
    </style>
</head>
<body>
    <h1>Win Rate Evolution</h1>
    <canvas id="winRateChart"></canvas>

    <h1>Equity Curve</h1>
    <canvas id="equityCurveChart"></canvas>

    <h1>Risk/Reward Consistency Distribution</h1>
    <canvas id="riskRewardChart"></canvas>

    <h1>Win vs Loss Ratio</h1>
    <canvas id="winLossChart"></canvas>

    <h1>Daily P&L Heatmap</h1>
    <canvas id="plHeatmapChart"></canvas>

    <script>
        // Example Data for charts
        const winRateData = [0.75, 0.70, 0.80, 0.85, 0.90]; // Sample win rates
        const equityData = [10000, 12000, 15000, 13000, 16000]; // Sample equity values
        const riskRewardData = [0.5, 1.0, 1.5, 2.0]; // Sample risk/reward ratios
        const winLossData = [60, 40]; // Sample wins and losses
        const plData = [500, -200, 300, -100, 400]; // Sample daily P&L data

        // Win Rate Evolution Chart
        const ctx1 = document.getElementById('winRateChart').getContext('2d');
        const winRateChart = new Chart(ctx1, {
            type: 'line',
            data: {
                labels: ['Trade 1', 'Trade 2', 'Trade 3', 'Trade 4', 'Trade 5'],
                datasets: [{
                    label: 'Win Rate',
                    data: winRateData,
                    borderColor: 'rgba(75, 192, 192, 1)',
                    borderWidth: 2,
                    fill: false,
                    tension: 0.1,
                }]
            },
            options: {
                responsive: true,
                tooltips: { enabled: true },
                scales: {
                    x: { beginAtZero: true },
                    y: { beginAtZero: true, max: 1 }
                }
            }
        });

        // Equity Curve Chart
        const ctx2 = document.getElementById('equityCurveChart').getContext('2d');
        const equityCurveChart = new Chart(ctx2, {
            type: 'line',
            data: {
                labels: ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5'],
                datasets: [{
                    label: 'Equity Curve',
                    data: equityData,
                    borderColor: 'rgba(34, 202, 100, 1)',
                    backgroundColor: 'rgba(34, 202, 100, 0.2)',
                    borderWidth: 2,
                    fill: true,
                }]
            },
            options: {
                responsive: true,
                tooltips: { enabled: true },
                scales: {
                    x: { beginAtZero: true },
                    y: { beginAtZero: true }
                }
            }
        });

        // Risk/Reward Consistency Distribution Chart
        const ctx3 = document.getElementById('riskRewardChart').getContext('2d');
        const riskRewardChart = new Chart(ctx3, {
            type: 'bar',
            data: {
                labels: ['0.5', '1.0', '1.5', '2.0'],
                datasets: [{
                    label: 'Risk/Reward Ratio',
                    data: riskRewardData,
                    backgroundColor: 'rgba(255, 159, 64, 1)',
                    borderWidth: 1,
                }]
            },
            options: {
                scales: {
                    y: { beginAtZero: true }
                },
                responsive: true,
                tooltips: { enabled: true }
            }
        });

        // Win vs Loss Ratio Pie Chart
        const ctx4 = document.getElementById('winLossChart').getContext('2d');
        const winLossChart = new Chart(ctx4, {
            type: 'pie',
            data: {
                labels: ['Wins', 'Losses'],
                datasets: [{
                    label: 'Win vs Loss Ratio',
                    data: winLossData,
                    backgroundColor: ['rgba(75, 192, 192, 1)', 'rgba(255, 99, 132, 1)'],
                }]
            },
            options: {
                responsive: true,
                tooltips: { enabled: true }
            }
        });

        // Daily P&L Heatmap Chart
        const ctx5 = document.getElementById('plHeatmapChart').getContext('2d');
        const plHeatmapChart = new Chart(ctx5, {
            type: 'heatmap',
            data: {
                labels: ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5'],
                datasets: [{
                    label: 'Daily P&L',
                    data: plData,
                    backgroundColor: (value) => {
                        return value > 0 ? 'rgba(34, 202, 100, 1)' : 'rgba(255, 99, 132, 1)';
                    },
                }]
            },
            options: {
                scales: {
                    x: { display: false },
                    y: { display: false }
                }
            }
        });
    </script>
</body>
</html>
